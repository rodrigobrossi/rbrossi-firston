# ============================================================
# FirstOn CRM — Nginx API Gateway (local dev)
# Mirrors AWS API Gateway routing in production
# All services reachable via http://localhost:8080/api/v1/...
# ============================================================

events {
  worker_connections 1024;
}

http {
  # Upstreams — match ECS service names
  upstream auth         { server auth:3001;         keepalive 32; }
  upstream contact      { server contact:3002;      keepalive 32; }
  upstream calendar     { server calendar:3003;     keepalive 32; }
  upstream pipeline     { server pipeline:3004;     keepalive 32; }
  upstream contract     { server contract:3005;     keepalive 32; }
  upstream messaging    { server messaging:3006;    keepalive 32; }
  upstream sentiment    { server sentiment:3007;    keepalive 32; }
  upstream billing      { server billing:3008;      keepalive 32; }
  upstream notification { server notification:3009; keepalive 32; }

  # Rate limiting zones
  limit_req_zone $binary_remote_addr zone=auth_zone:10m    rate=20r/m;
  limit_req_zone $binary_remote_addr zone=api_zone:10m     rate=120r/m;
  limit_req_zone $binary_remote_addr zone=webhook_zone:10m rate=300r/m;

  # Log format
  log_format main '$remote_addr "$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent" ${request_time}s';

  server {
    listen 80;
    server_name localhost;

    # CORS headers
    add_header Access-Control-Allow-Origin  "http://localhost:3000" always;
    add_header Access-Control-Allow-Methods "GET,POST,PATCH,DELETE,OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization,Content-Type,x-user-id" always;

    # Preflight
    location / {
      if ($request_method = OPTIONS) { return 204; }
    }

    # ── Health check (gateway level) ─────────────────────────
    location = /health {
      return 200 '{"gateway":"ok","app":"FirstOn CRM","env":"local"}';
      add_header Content-Type application/json;
    }

    # ── Auth ─────────────────────────────────────────────────
    location ~ ^/auth/ {
      limit_req zone=auth_zone burst=10 nodelay;
      proxy_pass         http://auth;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── API v1 routes ─────────────────────────────────────────
    location ~ ^/api/v1/contacts {
      limit_req zone=api_zone burst=30 nodelay;
      proxy_pass http://contact;
      proxy_set_header X-Real-IP $remote_addr;
      rewrite ^/api/v1/(.*) /$1 break;
    }

    location ~ ^/api/v1/events {
      limit_req zone=api_zone burst=30 nodelay;
      proxy_pass http://calendar;
      proxy_set_header X-Real-IP $remote_addr;
      rewrite ^/api/v1/(.*) /$1 break;
    }

    location ~ ^/api/v1/opportunities {
      limit_req zone=api_zone burst=30 nodelay;
      proxy_pass http://pipeline;
      proxy_set_header X-Real-IP $remote_addr;
      rewrite ^/api/v1/(.*) /$1 break;
    }

    location ~ ^/api/v1/contracts {
      limit_req zone=api_zone burst=20 nodelay;
      proxy_pass http://contract;
      proxy_set_header X-Real-IP $remote_addr;
      rewrite ^/api/v1/(.*) /$1 break;
    }

    location ~ ^/api/v1/conversations|/api/v1/messages {
      limit_req zone=api_zone burst=60 nodelay;
      proxy_pass http://messaging;
      proxy_set_header X-Real-IP $remote_addr;
      rewrite ^/api/v1/(.*) /$1 break;
    }

    location ~ ^/api/v1/sentiment {
      limit_req zone=api_zone burst=60 nodelay;
      proxy_pass http://sentiment;
      proxy_set_header X-Real-IP $remote_addr;
      rewrite ^/api/v1/(.*) /$1 break;
    }

    location ~ ^/api/v1/billing {
      limit_req zone=api_zone burst=10 nodelay;
      proxy_pass http://billing;
      proxy_set_header X-Real-IP $remote_addr;
      rewrite ^/api/v1/(.*) /$1 break;
    }

    location ~ ^/api/v1/notify {
      limit_req zone=api_zone burst=20 nodelay;
      proxy_pass http://notification;
      proxy_set_header X-Real-IP $remote_addr;
      rewrite ^/api/v1/(.*) /$1 break;
    }

    # ── Public webhooks (no rate limit) ──────────────────────
    location /webhooks/whatsapp {
      proxy_pass http://messaging/webhooks/whatsapp;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /webhooks/pix {
      proxy_pass http://billing/webhooks/pix;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Service health checks (internal) ─────────────────────
    location ~ ^/internal/health/(.+)$ {
      internal;
      proxy_pass http://$1/health;
    }
  }
}
